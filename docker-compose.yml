services:
  proxy-pool:
    build: .
    container_name: proxy-pool
    restart: unless-stopped
    ports:
      - "10710:10710"  # 代理端口 (HTTP/SOCKS5)
      - "8012:8080"    # Web UI 端口
    volumes:
      - ./config:/app/config
      - ./subscriptions.txt:/app/subscriptions.txt:ro
      - ./proxy_sources.txt:/app/proxy_sources.txt:ro
    environment:
      - LISTEN_PORT=10710
      - INTERVAL_SECONDS=1800
      - WEB_PORT=8080
      - CLASH_API_PORT=9090
      - ENABLE_WEB_UI=true
      - MAX_NODES=500
      - TOP_N_NODES=50
      - AUTO_SWITCH_INTERVAL=0
      - VERIFY_HTTP_PROXIES=true
      - MAX_HTTP_PROXIES=100
      - MAX_PER_SOURCE=30
      - ENABLE_ONLINE_SOURCES=false
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1:8080/api/status"]
      interval: 60s
      timeout: 10s
      retries: 3
